# Airlock config for workspace-based task separation
config-version = 2

# Start Airlock at login
start-at-login = true

# Normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Keep your named workspaces alive even when empty
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# Make all windows floating by default (no auto-tiling)
[[on-window-detected]]
    check-further-callbacks = true
    run = 'layout floating'

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 8
    inner.vertical   = 8
    outer.left       = 8
    outer.bottom     = 8
    outer.top        = 8
    outer.right      = 8

[mode.main.binding]
    # Layout controls
    option-slash = 'layout tiles horizontal vertical'
    option-comma = 'layout accordion horizontal vertical'

    # Cycle through windows of the same app on current workspace
    cmd-backtick = 'focus same-app-next'
    cmd-shift-backtick = 'focus same-app-prev'

    # Focus (vim-style)
    option-h = 'focus left'
    option-j = 'focus down'
    option-k = 'focus up'
    option-l = 'focus right'

    # Move windows (vim-style)
    option-shift-h = 'move left'
    option-shift-j = 'move down'
    option-shift-k = 'move up'
    option-shift-l = 'move right'

    # Resize
    option-minus = 'resize smart -50'
    option-equal = 'resize smart +50'

    # Quick toggle back to previous workspace
    option-tab = 'workspace-back-and-forth'

    # Move workspace to another monitor (if you ever use an external display)
    option-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # --- Hyper key launchers (Caps Lock + key) ---
    # Hyper = Ctrl+Shift+Alt+Cmd (remapped from Caps Lock via Karabiner)
    ctrl-option-shift-cmd-c = '''exec-and-forget osascript -e '
    tell application "Google Chrome" to make new window'
    '''
    ctrl-option-shift-cmd-f = '''exec-and-forget osascript -e '
    tell application "Firefox" to activate
    tell application "System Events" to keystroke "n" using command down'
    '''
    ctrl-option-shift-cmd-b = '''exec-and-forget osascript -e '
    tell application "Brave Browser" to make new window'
    '''
    ctrl-option-shift-cmd-i = '''exec-and-forget osascript -e '
    tell application "iTerm" to create window with default profile'
    '''
    ctrl-option-shift-cmd-s = '''exec-and-forget osascript -e '
    tell application "Spotify" to activate'
    '''
    ctrl-option-shift-cmd-u = '''exec-and-forget osascript -e '
    tell application "Sublime Text" to activate
    tell application "System Events" to keystroke "n" using command down'
    '''
    ctrl-option-shift-cmd-o = '''exec-and-forget osascript -e '
    tell application "Obsidian" to activate'
    '''
    ctrl-option-shift-cmd-r = '''exec-and-forget osascript -e '
    tell application "Cursor" to activate
    tell application "System Events" to keystroke "n" using {shift down, command down}'
    '''
    ctrl-option-shift-cmd-l = '''exec-and-forget osascript -e '
    tell application "Slack" to activate'
    '''

    # Workspace switching
    option-1 = 'workspace 1'
    option-2 = 'workspace 2'
    option-3 = 'workspace 3'
    option-4 = 'workspace 4'
    option-5 = 'workspace 5'
    option-6 = 'workspace 6'
    option-7 = 'workspace 7'
    option-8 = 'workspace 8'
    option-9 = 'workspace 9'
    option-0 = 'workspace 10'

    # Workspace switching (letters)
    option-a = 'workspace A'
    option-b = 'workspace B'
    option-c = 'workspace C'
    option-d = 'workspace D'
    option-e = 'workspace E'
    option-f = 'workspace F'
    option-g = 'workspace G'
    option-i = 'workspace I'
    option-m = 'workspace M'
    option-n = 'workspace N'
    option-o = 'workspace O'
    option-p = 'workspace P'
    option-q = 'workspace Q'
    option-r = 'workspace R'
    option-s = 'workspace S'
    option-t = 'workspace T'
    option-u = 'workspace U'
    option-v = 'workspace V'
    option-w = 'workspace W'
    option-x = 'workspace X'
    option-y = 'workspace Y'
    option-z = 'workspace Z'

    # Move window to workspace
    option-shift-1 = 'move-node-to-workspace 1'
    option-shift-2 = 'move-node-to-workspace 2'
    option-shift-3 = 'move-node-to-workspace 3'
    option-shift-4 = 'move-node-to-workspace 4'
    option-shift-5 = 'move-node-to-workspace 5'
    option-shift-6 = 'move-node-to-workspace 6'
    option-shift-7 = 'move-node-to-workspace 7'
    option-shift-8 = 'move-node-to-workspace 8'
    option-shift-9 = 'move-node-to-workspace 9'
    option-shift-0 = 'move-node-to-workspace 10'

    # Move window to workspace (letters)
    option-shift-a = 'move-node-to-workspace A'
    option-shift-b = 'move-node-to-workspace B'
    option-shift-c = 'move-node-to-workspace C'
    option-shift-d = 'move-node-to-workspace D'
    option-shift-e = 'move-node-to-workspace E'
    option-shift-f = 'move-node-to-workspace F'
    option-shift-g = 'move-node-to-workspace G'
    option-shift-i = 'move-node-to-workspace I'
    option-shift-m = 'move-node-to-workspace M'
    option-shift-n = 'move-node-to-workspace N'
    option-shift-o = 'move-node-to-workspace O'
    option-shift-p = 'move-node-to-workspace P'
    option-shift-q = 'move-node-to-workspace Q'
    option-shift-r = 'move-node-to-workspace R'
    option-shift-s = 'move-node-to-workspace S'
    option-shift-t = 'move-node-to-workspace T'
    option-shift-u = 'move-node-to-workspace U'
    option-shift-v = 'move-node-to-workspace V'
    option-shift-w = 'move-node-to-workspace W'
    option-shift-x = 'move-node-to-workspace X'
    option-shift-y = 'move-node-to-workspace Y'
    option-shift-z = 'move-node-to-workspace Z'

    # Service mode
    option-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']
